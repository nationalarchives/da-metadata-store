{% extends "base.html" %}

{% block content %}
    <div class="tna-container">
        <div class="tna-column tna-column--width-2-3 tna-column--full-small tna-column--full-tiny tna-!--margin-top-l">
            <hgroup class="tna-hgroup-xl">
                <h1 class="tna-hgroup__title">{{ record.name }}</h1>
            </hgroup>
            <h2 class="tna-heading-l" id="summary">Summary</h2>
            <dl class="tna-dl tna-dl--lined">
                <dt>
                    <span class="tna-dl__sticky-title">Description</span>
                </dt>
                <dd class="break-words">{{ record.description }}</dd>
                {% for k, v in record.data.items() %}
                    <dt>
                        <span class="tna-dl__sticky-title">{{ k }}</span>
                    </dt>
                    <dd class="break-words">{{ v }}</dd>
                {% endfor %}
            </dl>
        </div>
    </div>
{% endblock %}
