services:
  oidc:
    image: ghcr.io/cdelmonte-zg/nanoidp:latest
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    volumes:
      - ./tests/oidc-config:/app/config
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
  app:
    build:
      context: .
      dockerfile: Dockerfile.django
    ports:
      - "8000:8080"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://user@db:5432/postgres
      - PGPASSWORD=password
      - ISSUER=http://oidc:8001
      - ACCESS_TOKEN_URL=http://oidc:8001/token
      - CLIENT_ID=demo-client
      - CLIENT_SECRET=demo-secret
      - LOGOUT_BASE_URL=http://localhost:8000/
    restart: unless-stopped
    volumes:
      - ./:/app
    depends_on:
      - db
      - oidc